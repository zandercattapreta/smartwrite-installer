<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartWrite Installer</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="neutralino.js"></script>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 8px;">
            <span class="material-icons">download</span>
            <h1>SmartWrite Installer</h1>
        </div>
        <div id="status-dot" style="width: 10px; height: 10px; background: #00E676; border-radius: 50%;"></div>
    </header>

    <main>
        <div class="vault-select-container">
            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Target Obsidian Vault</label>
            <div class="select-wrapper">
                <select id="vault-select">
                    <option value="" disabled selected>Scanning for vaults...</option>
                </select>
            </div>
            <div style="margin-top: 8px; font-size: 0.8rem; color: #666;">
                Don't see your vault?
                <a href="#" onclick="manualSelectVault()">Select manually</a>
            </div>
        </div>

        <h2 style="font-size: 1rem; margin-bottom: 16px;">Available Plugins</h2>
        <div class="plugin-list" id="plugin-list">
            <!-- Cards will be injected here -->
            <div style="text-align: center; width: 100%; padding: 20px;">Loading plugins...</div>
        </div>
    </main>

    <div class="fab" onclick="installSelected()">
        <span class="material-icons">download_done</span>
        <span>INSTALL SELECTED</span>
    </div>

    <div id="status-message">Ready</div>

    <script src="js/main.js"></script>
</body>
</html>
